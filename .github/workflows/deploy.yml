name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: cafelosgrisales-prod
      CLOUDFRONT_DISTRIBUTION_ID: ECQDQ3QWZ2QH5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::339712768913:role/GitHubActionsCafeLosGrisalesDeployRole
          aws-region: ${{ env.AWS_REGION }}

      # Hashed asset files (Vite emits content-hashed names) get long cache.
      # HTML, sitemap.xml, robots.txt, og-image, PDFs and other unhashed root
      # files get short cache so updates land fast.
      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.pdf" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --exclude "og-image.jpg" \
            --exclude "CNAME" \
            --exclude "favicon*" \
            --exclude "apple-touch-icon*"

      - name: Sync HTML + root files (short cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=60, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.pdf" \
            --include "*.xml" \
            --include "*.txt" \
            --include "og-image.jpg" \
            --include "favicon*" \
            --include "apple-touch-icon*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
